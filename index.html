<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROPA DASH REMIX | OFICIAL</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0c0c0c 100%);
            width: 100%;
            padding: 60px 0;
            text-align: center;
            border-bottom: 3px solid #00d9ff;
            box-shadow: 0 5px 30px rgba(0, 217, 255, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #00d9ff;
            text-shadow: 0 0 20px #00d9ff;
            letter-spacing: 8px;
            font-weight: 900;
        }

        .btn-join {
            margin-top: 25px;
            display: inline-block;
            padding: 18px 40px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            text-transform: uppercase;
        }

        .btn-join:hover {
            transform: translateY(-5px);
            background-color: #4752c4;
            box-shadow: 0 0 30px #5865F2;
        }

        .container {
            max-width: 1100px;
            padding: 60px 20px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 50px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-canais {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card-canal {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 30px;
            width: 240px;
            transition: 0.4s;
            text-decoration: none;
            color: white;
        }

        .card-canal:hover {
            border-color: #00ff00;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 255, 0, 0.15);
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #222;
            margin: 0 auto 20px;
            border: 3px solid #00ff00;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }

        .nome-canal {
            font-weight: bold;
            font-size: 1.3rem;
            display: block;
            margin-bottom: 5px;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #444;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
