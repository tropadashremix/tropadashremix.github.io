<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROPA DASH REMIX | OFICIAL</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0c0c0c 100%);
            width: 100%;
            padding: 60px 0;
            text-align: center;
            border-bottom: 3px solid #00d9ff;
            box-shadow: 0 5px 30px rgba(0, 217, 255, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #00d9ff;
            text-shadow: 0 0 20px #00d9ff;
            letter-spacing: 8px;
            font-weight: 900;
        }

        .btn-join {
            margin-top: 25px;
            display: inline-block;
            padding: 18px 40px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            text-transform: uppercase;
        }

        .btn-join:hover {
            transform: translateY(-5px);
            background-color: #4752c4;
            box-shadow: 0 0 30px #5865F2;
        }

        .container {
            max-width: 1100px;
            padding: 60px 20px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 50px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-canais {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card-canal {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 30px;
            width: 240px;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            position: relative;
        }

        /* Estilos por Cargo */
        .lider { border-color: #00ff00; }
        .lider:hover { border-color: #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); }
        .lider .foto-perfil { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }

        .vice-lider { border-color: #00d9ff; }
        .vice-lider:hover { border-color: #00d9ff; box-shadow: 0 0 30px rgba(0, 217, 255, 0.3); }
        .vice-lider .foto-perfil { border-color: #00d9ff; box-shadow: 0 0 15px #00d9ff; }

        .pre-elite { border-color: #aaaaaa; }
        .pre-elite:hover { border-color: #ffffff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        .pre-elite .foto-perfil { border-color: #aaaaaa; }

        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #222;
            margin: 0 auto 20px;
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }

        .nome-canal {
            font-weight: bold;
            font-size: 1.3rem;
            display: block;
            margin-bottom: 5px;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        /* --- ESTILOS DA TDR TV (ADICIONADO) --- */
        .tv-section { margin-bottom: 50px; text-align: center; width: 100%; }
        .tv-frame {
            width: 90%; max-width: 800px; aspect-ratio: 16/9; margin: 20px auto;
            background: #000; border: 6px solid #1a1a1a; border-radius: 15px;
            position: relative; box-shadow: 0 0 40px rgba(0, 217, 255, 0.2);
            overflow: hidden; cursor: pointer;
        }
        #player { width: 100%; height: 100%; pointer-events: none; }
        .tv-logo {
            position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.8);
            padding: 4px 12px; border-radius: 4px; font-family: 'Arial Black', sans-serif;
            font-size: 0.8rem; color: #fff; z-index: 20; border-left: 3px solid #00d9ff;
        }
        .som-aviso {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; color: #fff;
            font-weight: bold; transition: 0.5s;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #444;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>TDR REBORN</h1>
        <p style="color: #888; margin-top: 10px;">O QG Oficial da Tropa Dash Remix</p>
        <a href="https://discord.gg/dKHgGJCD" target="_blank" class="btn-join">Entrar no Servidor</a>
    </header>

    <div class="container">

                <div class="foto-perfil">
                    <img src="https://yt3.googleusercontent.com/3LWLPVYDEpUScQ7ZItgM3NZNFZYRH1zfltlOTngQpTy0XDLaZ3YJ3p-faE-fiX1SX53SB2k53g=s160-c-k-c0x00ffffff-no-rj" alt="Sonezera">

                </div>

            <a href="https://youtube.com/@apenasumfadosukuna?si=ilvWskuolITX3bj6" target="_blank" class="card-canal pre-elite">
                <div class="foto-perfil">
                    <img src="https://yt3.googleusercontent.com/LnOsdj2z23jeZqHhwsSy_PXA0MEe-fkoHreuG8vsspNDwHBuglXEs3ZtjpUr-eJN1AUAM6WnZw=s160-c-k-c0x00ffffff-no-rj" alt="Pão Amanteigado">
                </div>
                <span class="nome-canal">Pão Amanteigado</span>
                <span class="status">Membro Pré Elite</span>
            </a>

        </div>
    </div>

    <section class="tv-section">
        <h2 style="color: #00d9ff; font-size: 1.5rem;">📺 TRANSMISSÃO: TDR TV</h2>
        <div class="tv-frame" id="tv-container">
            <div class="tv-logo">TDR <b>TV</b></div>
            <div class="som-aviso" id="aviso-som">
                <span style="font-size: 1.5rem;">🔇 CLIQUE PARA ATIVAR O SOM</span>
            </div>
            <div id="player"></div>
        </div>
    </section>

    <footer>
        © 2026 Tropa Dash Remix • Criado por Didio
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: {
                    'listType': 'playlist',
                    'list': 'PLQ_I_DjoRP8OMIm213FDXRa2e9FO2zrBv',
                    'autoplay': 1, 'mute': 1, 'controls': 0, 'loop': 1, 'modestbranding': 1
                },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }
        document.getElementById('tv-container').addEventListener('click', function() {
            if(player) {
                player.unMute();
                document.getElementById('aviso-som').style.opacity = '0';
                setTimeout(() => { document.getElementById('aviso-som').style.display = 'none'; }, 500);
            }
        });
    </script>
</body>
</html>
